<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to the Smart Incident Indicator — Real-Time Maritime Intelligence Platform.">
    <title>Sign In — Smart Incident Indicator</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/animations.css">
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link rel="stylesheet" href="/assets/css/responsive.css">
</head>
<body>
    <!-- Login Page -->
    <div class="login-page">
        <!-- Animated Background -->
        <div class="login-page__bg">
            <div class="login-page__orb login-page__orb--1"></div>
            <div class="login-page__orb login-page__orb--2"></div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <!-- Logo -->
            <div class="login-card__logo">
                <div class="login-card__logo-icon">
                    <i class="fas fa-ship"></i>
                </div>
                <span class="login-card__logo-text">Smart Incident Indicator</span>
            </div>

            <h1 class="login-card__title">Welcome Back</h1>
            <p class="login-card__subtitle">Sign in to access your maritime intelligence dashboard</p>

            <!-- Login Form -->
            <form class="login-card__form" id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="login-email">Email Address</label>
                    <input 
                        type="email" 
                        class="form-input" 
                        id="login-email" 
                        placeholder="you@company.com" 
                        required
                        autocomplete="email"
                        aria-label="Email address"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    <div style="position: relative;">
                        <input 
                            type="password" 
                            class="form-input" 
                            id="login-password" 
                            placeholder="Enter your password" 
                            required
                            autocomplete="current-password"
                            aria-label="Password"
                        >
                        <button 
                            type="button" 
                            id="toggle-password"
                            style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--color-text-muted); cursor: pointer; font-size: 0.875rem;"
                            aria-label="Toggle password visibility"
                        >
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="login-card__options">
                    <label class="login-card__remember">
                        <input type="checkbox" id="remember-me"> Remember me
                    </label>
                    <a href="#" class="login-card__forgot">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-full" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>

                <div class="login-card__divider">or continue with</div>

                <div style="display: flex; gap: 12px;">
                    <button type="button" class="btn btn-secondary" style="flex: 1;">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="btn btn-secondary" style="flex: 1;">
                        <i class="fab fa-microsoft"></i> Microsoft
                    </button>
                </div>
            </form>

            <div class="login-card__footer">
                Don't have an account? <a href="#">Request Access</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Toggle password visibility
        const togglePwd = document.getElementById('toggle-password');
        const pwdInput = document.getElementById('login-password');

        togglePwd.addEventListener('click', () => {
            const isPassword = pwdInput.type === 'password';
            pwdInput.type = isPassword ? 'text' : 'password';
            togglePwd.querySelector('i').className = isPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
        });

        // Handle login (demo — redirect to dashboard)
        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const originalText = btn.innerHTML;

            // Show loading state
            btn.innerHTML = '<div class="spinner" style="width: 20px; height: 20px; border-width: 2px;"></div> Signing in...';
            btn.disabled = true;

            // Simulate auth delay then redirect
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1500);
        }

        // Add subtle animation on input focus
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.style.transform = 'scale(1.01)';
                input.parentElement.style.transition = 'transform 0.2s ease';
            });
            input.addEventListener('blur', () => {
                input.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
