<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shipments — Smart Incident Indicator. Track, filter, and export shipment data.">
    <title>Shipments — Smart Incident Indicator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/layout.css">
    <link rel="stylesheet" href="/assets/css/animations.css">
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link rel="stylesheet" href="/assets/css/responsive.css">
</head>
<body>
    <div class="page-loader" id="page-loader"><div class="page-loader__content"><div class="page-loader__spinner"></div><p class="page-loader__text">Loading Shipments...</p></div></div>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div id="navbar-container"></div>
            <main class="page-content" role="main">
                <div class="breadcrumbs">
                    <a href="/dashboard" class="breadcrumbs__item">Dashboard</a>
                    <span class="breadcrumbs__separator"><i class="fas fa-chevron-right"></i></span>
                    <span class="breadcrumbs__item breadcrumbs__item--active">Shipments</span>
                </div>
                <div class="page-header">
                    <div class="page-header__left">
                        <h1 class="page-header__title">Shipment Tracker</h1>
                        <p class="page-header__subtitle">Monitor all active and historical shipments</p>
                    </div>
                    <div class="page-header__actions">
                        <button class="btn btn-secondary btn-sm" id="export-csv-btn"><i class="fas fa-file-csv"></i> Export CSV</button>
                        <button class="btn btn-secondary btn-sm" id="export-pdf-btn"><i class="fas fa-file-pdf"></i> Export PDF</button>
                    </div>
                </div>
                <!-- Filters -->
                <div class="filters-bar">
                    <input type="text" class="form-input search-input" id="shipment-search" placeholder="Search shipments..." style="max-width: 300px;">
                    <select class="form-select" id="risk-filter">
                        <option value="">All Risk Levels</option>
                        <option value="critical">Critical</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                    <select class="form-select" id="status-filter">
                        <option value="">All Status</option>
                        <option value="In Transit">In Transit</option>
                        <option value="Delayed">Delayed</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
                <!-- Table -->
                <div class="table-container">
                    <table class="data-table" id="shipments-table">
                        <thead>
                            <tr>
                                <th data-sort="id">ID <i class="fas fa-sort"></i></th>
                                <th data-sort="vessel">Vessel <i class="fas fa-sort"></i></th>
                                <th data-sort="origin">Origin <i class="fas fa-sort"></i></th>
                                <th data-sort="destination">Destination <i class="fas fa-sort"></i></th>
                                <th>Transit Ports</th>
                                <th data-sort="eta">ETA <i class="fas fa-sort"></i></th>
                                <th data-sort="status">Status <i class="fas fa-sort"></i></th>
                                <th data-sort="riskScore">Risk <i class="fas fa-sort"></i></th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="shipments-tbody"></tbody>
                    </table>
                </div>
                <!-- Pagination -->
                <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 16px; flex-wrap: wrap; gap: 12px;">
                    <span style="font-size: 0.8125rem; color: var(--color-text-muted);" id="table-info"></span>
                    <div class="pagination" id="shipments-pagination"></div>
                </div>
            </main>
            <div id="footer-container"></div>
        </div>
    </div>
    <script type="module" src="/assets/js/app.js"></script>
    <script type="module" src="/assets/js/shipments.js"></script>
</body>
</html>
